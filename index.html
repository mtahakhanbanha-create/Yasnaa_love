<title>Love Yasna 💙</title>

body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(#0a0f1f, #05060c);
  font-family: Arial;
  color: #7ecbff;
}

/* 💫 title */
.title {
  text-align: center;
  font-size: 50px;
  margin-top: 60px;
  text-shadow: 0 0 15px #7ecbff;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #7ecbff; }
  to { text-shadow: 0 0 30px #7ecbff; }
}

/* 💬 text */
.text {
  text-align: center;
  font-size: 28px;
  margin-top: 40px;
}

/* 🌟 stars */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
}

/* 💙 heart */
.heart {
  position: absolute;
  width: 20px;
  height: 20px;
  background: #ff4fa3;
  transform: rotate(45deg);
  animation: float 5s linear infinite;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 20px;
  height: 20px;
  background: #ff4fa3;
  border-radius: 50%;
}

.heart::before { left: -10px; }
.heart::after { top: -10px; }

@keyframes float {
  from { transform: translateY(100vh) rotate(45deg); }
  to { transform: translateY(-10vh) rotate(45deg); }
}
</style>
</head>
